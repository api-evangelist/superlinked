aid: superlinked
name: Superlinked
review:
  question: Does Superlinked expose a documented public WebSocket or streaming API?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was created. Superlinked's HTTP surface is the
    request/response REST API generated by the Superlinked Server (ingest,
    search, data-loader). No WebSocket, SSE, or other event/streaming
    transport is documented, so there is no streaming surface in scope for
    AsyncAPI modeling.
findings:
  summary: |
    Superlinked is primarily an open-source Apache-2.0 Python framework for
    building vector-compute pipelines (Schema, Space, Index, Query, Source,
    Executor). It is NOT a hosted commercial API in the usual sense. Its HTTP
    API surface is produced by the Superlinked Server: when an app is run with
    a RestExecutor / RestApp, the server auto-generates REST endpoints DERIVED
    FROM the app's own schema and registered queries. The two primary generated
    endpoints are POST /api/v1/ingest/{schema} (ingest records, compute
    embeddings, write to the connected vector DB) and POST
    /api/v1/search/{query_name} (run a registered query). Configured batch data
    loaders add POST /data-loader/{name}/run and GET /data-loader/{name}/status.
    Because the endpoints and request bodies are schema-generated, the concrete
    API differs per deployment; the OpenAPI in this repo models the templated
    pattern, not a fixed hosted contract. A managed Superlinked Cloud exists in
    early access (sales-led, no public pricing). The open-source framework
    repository was archived on 2026-05-29 as the team pivoted to the Superlinked
    Inference Engine (SIE); this catalog documents the framework + server REST
    pattern as last published.
  transports:
    - protocol: REST
      scheme: http
      baseURL: http://localhost:8080/api/v1
      documented: true
      note: Generated by the Superlinked Server from the app's schema/index/query definitions. Host varies per deployment (self-hosted or Superlinked Cloud).
    - protocol: SSE
      scheme: http
      documented: false
      note: No Server-Sent Events surface is documented.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented for ingestion, query, or any other product surface.
  endpointsConfirmedRest:
    - POST http://localhost:8080/api/v1/ingest/{schema}
    - POST http://localhost:8080/api/v1/search/{query_name}
    - POST http://localhost:8080/data-loader/{name}/run
    - GET  http://localhost:8080/data-loader/{name}/status
  surfaceTypes:
    - type: Framework (Python library/SDK)
      note: pip install superlinked; Apache-2.0. Declarative Schema/Space/Index/Query/Source/Executor objects. Not an HTTP API.
    - type: Server-generated REST API
      note: RestExecutor/RestApp expose ingest + search endpoints templated by schema and query name; self-hostable.
    - type: Managed Cloud
      note: Superlinked Cloud, early access, sales-led; runs the same generated REST surface as a managed service.
sources:
  - url: https://github.com/superlinked/superlinked
    type: Documentation
    note: Framework README and reference; describes Server-generated REST endpoints and Apache-2.0 license. Repo archived 2026-05-29.
  - url: https://www.superlinked.com
    type: Website
    note: Company site; describes self-hosted server and managed Superlinked Cloud (early access).
  - url: https://pypi.org/project/superlinked
    type: Documentation
    note: PyPI distribution of the open-source framework.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or streaming protocol surface exists, so no AsyncAPI document
    was authored. The catalog distinguishes three distinct surfaces - the
    open-source Python framework, the self-hosted Server-generated REST API,
    and the managed Superlinked Cloud - and the OpenAPI models the templated,
    schema-generated REST pattern rather than fabricating a fixed hosted
    contract.
