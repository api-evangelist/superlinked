description: >-
  FinOps view of running Superlinked. The framework and the self-hosted
  Superlinked Server are Apache-2.0 and carry no license fee; cost is driven by
  the compute you provision to run the server and embedding inference, plus the
  external vector database (Redis, MongoDB, Qdrant, TopK) you connect. Spend is
  therefore infrastructure-based rather than per-API-call. Superlinked Cloud is
  a separate managed offering (early access, sales-led) whose billing is not
  publicly documented.
notes: >-
  Self-hosted spend is dominated by compute, embedding inference, and the
  backing vector database - none billed by Superlinked. Verify any Superlinked
  Cloud billing model with the vendor on reconciliation.
