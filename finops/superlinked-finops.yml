meters:
- name: server_compute_hours
  description: Compute hours to run the self-hosted Superlinked Server (CPU/GPU, containers, or Kubernetes), billed by your infrastructure provider, not Superlinked.
  unit: hours
  aggregation: sum
  dimensions:
  - deployment
  - environment
- name: embedding_inference
  description: Embedding model inference cost - local GPU/CPU compute or an external embedding provider - consumed during ingestion and query.
  unit: embeddings
  aggregation: sum
  dimensions:
  - deployment
  - model
- name: vector_db_storage
  description: Storage and operations on the connected external vector database (Redis, MongoDB, Qdrant, TopK), billed by that database's provider.
  unit: gb_month
  aggregation: sum
  dimensions:
  - deployment
  - vector_db
- name: vector_db_operations
  description: Read/write/query operations against the backing vector database.
  unit: operations
  aggregation: sum
  dimensions:
  - deployment
  - vector_db
- name: cloud_subscription
  description: Superlinked Cloud managed subscription, where applicable; billing model not publicly documented.
  unit: contract
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track compute, embedding inference, and vector-DB spend across providers; Superlinked itself emits no usage bill for the open-source server.
- name: Allocation
  description: Tag server deployments and vector-DB clusters per workload/team; map infrastructure cost back to internal cost centers.
- name: Optimization
  description: Right-size server compute, batch ingestion via data loaders, choose efficient embedding models, and pick a vector DB and tier that fit the workload.
- name: Accountability
  description: Assign owners per deployment; review compute and vector-DB spend monthly against budget.
